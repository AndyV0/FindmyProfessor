<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Join FindMyProfessor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Manrope:wght@300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #f4efe6;
    --ink: #171411;
    --ink-soft: #4a4339;
    --accent: #e8a733;
    --terracotta: #c96442;
    --cream: #f4efe6;
    --rule: rgba(23, 20, 17, 0.1);
    --error: #c94242;
    --success: #7a8b6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, rgba(232, 167, 51, 0.05), transparent 70%);
    opacity: 0.5;
  }

  .container {
    width: 100%;
    max-width: 900px;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    color: var(--ink);
    border-radius: 12px;
    overflow: visible;
    box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    min-height: 540px;
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .step-1 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
  }

  .role-option {
    padding: 60px 44px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: 0.3s;
    border: none;
    text-align: left;
  }

  .role-option.student { background: var(--surface); border-right: 1px solid var(--rule); }
  .role-option.professor { background: #1a1814; color: var(--cream); }
  .role-option:hover { opacity: 0.9; transform: scale(0.99); }

  .role-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.6;
  }

  h2 {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'wght' 400, 'SOFT' 30;
    font-size: 42px;
    line-height: 1;
    margin-bottom: 16px;
  }

  h2 em { font-style: italic; color: var(--terracotta); }
  .professor h2 em { color: var(--accent); }

  @media (max-width: 768px) {
    .step-1 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="backdrop"></div>

<div class="container">
  <div class="card" id="signupCard">
    
    <div class="step-1" id="step1">
      <button class="role-option student" onclick="window.goToStep2('student')">
        <div>
          <div class="role-eyebrow">Option 01</div>
          <h2>I am a <em>Student</em></h2>
          <p style="font-size: 14px; opacity: 0.7;">Discover and apply for research opportunities.</p>
        </div>
        <div style="font-family: 'JetBrains Mono'; font-size: 11px;">Continue with GitHub →</div>
      </button>

      <button class="role-option professor" onclick="window.goToStep2('professor')">
        <div>
          <div class="role-eyebrow">Option 02</div>
          <h2>I am a <em>Professor</em></h2>
          <p style="font-size: 14px; opacity: 0.7;">Post roles and manage student applicants.</p>
        </div>
        <div style="font-family: 'JetBrains Mono'; font-size: 11px;">Continue with GitHub →</div>
      </button>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from './supabase.js';

  // Attach functions to window so the HTML onclick attributes can see them
  window.goToStep2 = async (role) => {
    // 1. Save the chosen role locally before leaving the site
    localStorage.setItem('fmp_pending_role', role);

    // 2. Change the button visually so the user knows it's loading
    const card = document.getElementById('signupCard');
    card.innerHTML = `<div style="padding: 60px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center;">
                        <h2>Redirecting to <em>GitHub</em>...</h2>
                      </div>`;

    // 3. Trigger Supabase OAuth
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'github',
      options: {
        // Send them to the student portal to process the database entry
        redirectTo: window.location.origin + '/studentPortal.html'
      }
    });

    if (error) {
      alert("Error connecting to GitHub: " + error.message);
      window.location.reload();
    }
  };
</script>

</body>
</html>
