<script type="module">
// 1. Import your shared firebase config
import { 
    db, collection, getDocs, query, where, doc, setDoc 
} from './firebase.js';

// 2. This will hold our live data from the cloud
let UNIVERSITIES = [];

// 3. SEEDING FUNCTION (Run this ONCE then delete)
async function seedUniversities() {
    const mockData = [
        { id: 'sdmc', name: 'San Diego Mesa College', loc: 'San Diego, CA' },
        { id: 'laccd', name: 'Los Angeles City College', loc: 'Los Angeles, CA · LACCD' },
        { id: 'ucla', name: 'UCLA', loc: 'Los Angeles, CA' },
        { id: 'ucb', name: 'UC Berkeley', loc: 'Berkeley, CA' },
        { id: 'usc', name: 'University of Southern California', loc: 'Los Angeles, CA' },
        { id: 'stanford', name: 'Stanford University', loc: 'Stanford, CA' },
        { id: 'smc', name: 'Santa Monica College', loc: 'Santa Monica, CA' },
        { id: 'ucsd', name: 'UC San Diego', loc: 'La Jolla, CA' },
        { id: 'csun', name: 'CSU Northridge', loc: 'Northridge, CA' },
        { id: 'caltech', name: 'California Institute of Technology', loc: 'Pasadena, CA' },
    ];

    for (const uni of mockData) {
        await setDoc(doc(db, "universities", uni.id), {
            name: uni.name,
            loc: uni.loc,
            positionsCount: 0 // Starting at zero
        });
    }
    console.log("Database Seeded!");
}

// 4. FETCH DATA FROM FIREBASE (The permanent way)
async function loadUniversities() {
    const querySnapshot = await getDocs(collection(db, "universities"));
    UNIVERSITIES = querySnapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
    }));
    console.log("Live data loaded:", UNIVERSITIES);
}

// 5. SELECT UNIVERSITY (Real Query)
async function selectUniversity(id) {
    const uni = UNIVERSITIES.find(u => u.id === id);
    if (!uni) return;

    // UI Update
    const nameParts = uni.name.split(' ');
    const lastWord = nameParts.pop();
    document.getElementById('uniTitle').innerHTML = `${nameParts.join(' ')} <em>${lastWord}</em>`;
    
    // Fetch REAL positions where uniId matches
    const q = query(collection(db, "positions"), where("uniId", "==", id));
    const querySnapshot = await getDocs(q);
    const positionsToRender = querySnapshot.docs.map(d => d.data());

    document.getElementById('posCount').textContent = positionsToRender.length;
    renderPositions(positionsToRender, 'all');

    document.getElementById('heroView').style.display = 'none';
    document.getElementById('resultsView').classList.add('active');
    window.scrollTo(0, 0);
}

// 6. RENDER LOGIC
function renderPositions(list, filter) {
    const grid = document.getElementById('positionsGrid');
    const filtered = filter === 'all' ? list : list.filter(p => p.type === filter);

    if (!filtered.length) {
        grid.innerHTML = '<div style="padding:60px;text-align:center;color:var(--ink-soft);grid-column:1/-1;font-size:16px;">No roles currently available at this campus.</div>';
        return;
    }

    grid.innerHTML = filtered.map(p => `
        <div class="position">
            <span class="position-type ${p.type}">${p.type.toUpperCase()}</span>
            <h3>${p.title}</h3>
            <p class="position-prof"><strong>${p.prof}</strong> · ${p.dept}</p>
            <div class="position-foot">
                <span class="apply">View Details →</span>
            </div>
        </div>
    `).join('');
}

// 7. EXPOSE FUNCTIONS TO WINDOW (Needed for HTML onclicks)
window.openLogin = () => loginModal.classList.add('active');
window.goHome = () => {
    document.getElementById('heroView').style.display = 'flex';
    document.getElementById('resultsView').classList.remove('active');
};
window.selectUniversity = selectUniversity;

// INITIALIZE
// seedUniversities(); // UNCOMMENT THIS, REFRESH PAGE ONCE, THEN COMMENT OUT AGAIN
loadUniversities();

// Event Listener for Search
document.getElementById('uniSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const dropdown = document.getElementById('searchDropdown');
    const resultsDiv = document.getElementById('uniResults');
    
    if (!q) {
        dropdown.classList.remove('active');
        return;
    }

    const filtered = UNIVERSITIES.filter(u => u.name.toLowerCase().includes(q));
    
    resultsDiv.innerHTML = filtered.map(u => `
        <button class="uni-item" onclick="selectUniversity('${u.id}')">
            <div>
                <div class="uni-name">${u.name}</div>
                <div class="uni-loc">${u.loc}</div>
            </div>
            <div class="uni-meta"><strong>${u.positionsCount || 0}</strong> Roles</div>
        </button>
    `).join('');
    dropdown.classList.add('active');
});
</script>
